---
deployment:
  tasks:
    - export DEPLOYPATH=/home/omarketi/public_html/
    - /bin/cp -R css $DEPLOYPATH
    - /bin/cp -R js $DEPLOYPATH
    - /bin/cp -R images $DEPLOYPATH
    - /bin/cp -R en $DEPLOYPATH
    - /bin/cp -R pakalpojumi $DEPLOYPATH
    - /bin/cp -R birojs $DEPLOYPATH
    - /bin/cp -R kontakti $DEPLOYPATH
    - /bin/cp index.html $DEPLOYPATH
    - /bin/cp .htaccess $DEPLOYPATH
